<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Mechanic - AutoRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDemoKey"></script>
    <style>
        #map { height: 400px; border-radius: 10px; }
        .form-card { box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-radius: 15px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-car-front-fill"></i> AutoRescue</a>
            <a href="/logout" class="btn btn-outline-light">Logout</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card form-card">
                    <div class="card-body p-5">
                        <h2 class="mb-4 fw-bold"><i class="bi bi-lightning"></i> Request Mechanic Service</h2>
                        
                        <div id="alertBox"></div>

                        <form id="serviceForm">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Vehicle Type</label>
                                <select class="form-select form-select-lg" name="vehicle_type" required>
                                    <option value="">Select your vehicle type</option>
                                    <option value="Bike">Bike</option>
                                    <option value="Car">Car</option>
                                    <option value="Auto">Auto Rickshaw</option>
                                    <option value="Truck">Truck</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Issue Description</label>
                                <textarea class="form-control form-control-lg" name="issue_type" rows="4" placeholder="Describe the problem with your vehicle..." required></textarea>
                            </div>

                            <div class="mb-4">
                                <h5 class="fw-bold mb-3"><i class="bi bi-geo-alt"></i> Your Location</h5>
                                <div id="map" class="mb-3"></div>
                                <button type="button" class="btn btn-outline-primary w-100 mb-3" onclick="getLocation()">
                                    <i class="bi bi-crosshair"></i> Get Current Location
                                </button>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Latitude</label>
                                    <input type="number" class="form-control form-control-lg" name="latitude" step="0.0001" placeholder="28.6139" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Longitude</label>
                                    <input type="number" class="form-control form-control-lg" name="longitude" step="0.0001" placeholder="77.2090" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mt-3">
                                <i class="bi bi-check-circle"></i> Request Mechanic Now
                            </button>
                        </form>

                        <hr class="my-4">
                        <p class="text-center text-muted mb-0">
                            <small>We'll connect you with the nearest verified mechanic within minutes</small>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get user's current location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    document.querySelector('input[name="latitude"]').value = position.coords.latitude.toFixed(4);
                    document.querySelector('input[name="longitude"]').value = position.coords.longitude.toFixed(4);
                    showAlert('Location acquired successfully!', 'success');
                }, function() {
                    showAlert('Unable to get your location. Please enable location services.', 'warning');
                });
            } else {
                showAlert('Geolocation is not supported by this browser.', 'warning');
            }
        }

        // Handle form submission
        document.getElementById('serviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(document.getElementById('serviceForm'));
            
            try {
                const response = await fetch('/request-service', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert(data.message, 'success');
                    setTimeout(() => window.location.href = '/view-requests', 2000);
                } else {
                    showAlert(data.error, 'danger');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'danger');
            }
        });

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-circle"></i> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
        }

        // Initialize map with default location (Delhi)
        function initMap() {
            const defaultLocation = { lat: 28.6139, lng: 77.2090 };
            const map = new google.maps.Map(document.getElementById('map'), {
                zoom: 15,
                center: defaultLocation
            });
            new google.maps.Marker({
                position: defaultLocation,
                map: map
            });
        }

        // Initialize map when page loads
        window.addEventListener('load', initMap);
    </script>
</body>
</html>
