<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - AutoRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .sidebar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-accepted { background: #d1ecf1; color: #0c5460; }
        .status-completed { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 sidebar text-white p-4">
                <h4 class="mb-4 fw-bold"><i class="bi bi-person-circle"></i> {{ user.name }}</h4>
                <hr>
                <nav class="nav flex-column">
                    <a class="nav-link text-white active" href="/customer-dashboard">
                        <i class="bi bi-house"></i> Dashboard
                    </a>
                    <a class="nav-link text-white" href="/request-service">
                        <i class="bi bi-plus-circle"></i> Request Mechanic
                    </a>
                    <a class="nav-link text-white" href="/view-requests">
                        <i class="bi bi-list-check"></i> My Requests
                    </a>
                    <a class="nav-link text-white" href="/profile">
                        <i class="bi bi-gear"></i> Profile Settings
                    </a>
                    <hr class="bg-white">
                    <a class="nav-link text-white" href="/logout">
                        <i class="bi bi-box-arrow-left"></i> Logout
                    </a>
                </nav>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 p-4">
                <h2 class="mb-4 fw-bold"><i class="bi bi-speedometer2"></i> Dashboard</h2>

                <!-- Quick Stats -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card card-hover shadow-sm">
                            <div class="card-body text-center">
                                <h5 class="text-muted">Total Requests</h5>
                                <h2 class="text-primary">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-hover shadow-sm">
                            <div class="card-body text-center">
                                <h5 class="text-muted">Pending</h5>
                                <h2 class="text-warning">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-hover shadow-sm">
                            <div class="card-body text-center">
                                <h5 class="text-muted">Completed</h5>
                                <h2 class="text-success">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card card-hover shadow-sm">
                            <div class="card-body text-center">
                                <h5 class="text-muted">Rating</h5>
                                <h2 class="text-danger"><i class="bi bi-star-fill"></i> 0/5</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Action -->
                <div class="card shadow mb-4">
                    <div class="card-body">
                        <h5 class="card-title fw-bold"><i class="bi bi-lightning"></i> Need Emergency Help?</h5>
                        <p class="card-text">Request a mechanic near you in just 3 clicks</p>
                        <a href="/request-service" class="btn btn-primary btn-lg">
                            <i class="bi bi-plus-circle"></i> Request Mechanic Now
                        </a>
                    </div>
                </div>

                <!-- Recent Requests -->
                <div class="card shadow">
                    <div class="card-header bg-light">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-list-check"></i> Recent Requests</h5>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info" role="alert">
                            <i class="bi bi-info-circle"></i> No requests yet. <a href="/request-service">Create one now</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
