<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AutoRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .register-card { box-shadow: 0 10px 40px rgba(0,0,0,0.2); border-radius: 15px; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25); }
        .btn-register { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 10px 30px; }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card register-card">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4 fw-bold"><i class="bi bi-person-plus"></i> Create Account</h2>
                        
                        <div id="alertBox"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control form-control-lg" id="name" name="name" required>
                                <small class="form-text text-muted">Enter your full name</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Email Address</label>
                                <input type="email" class="form-control form-control-lg" id="email" name="email" required>
                                <small class="form-text text-muted">We'll never share your email</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Mobile Number</label>
                                <input type="tel" class="form-control form-control-lg" id="mobile" name="mobile" pattern="[0-9]{10}" required>
                                <small class="form-text text-muted">10-digit mobile number</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                                <small class="form-text text-muted">Minimum 6 characters</small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Confirm Password</label>
                                <input type="password" class="form-control form-control-lg" id="confirmPassword" required>
                                <small class="form-text text-muted">Passwords must match</small>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">I am a:</label>
                                <div class="btn-group w-100" role="group">
                                    <input type="radio" class="btn-check" name="role" id="roleCustomer" value="customer" checked>
                                    <label class="btn btn-outline-primary w-50" for="roleCustomer">
                                        <i class="bi bi-person-circle"></i> Customer
                                    </label>

                                    <input type="radio" class="btn-check" name="role" id="roleMechanic" value="mechanic">
                                    <label class="btn btn-outline-primary w-50" for="roleMechanic">
                                        <i class="bi bi-tools"></i> Mechanic
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-register btn-lg w-100 text-white fw-bold">
                                <i class="bi bi-check-circle"></i> Register
                            </button>
                        </form>

                        <hr class="my-4">
                        <p class="text-center text-muted">Already have an account? <a href="/login" class="fw-bold text-primary">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showAlert('Passwords do not match!', 'danger');
                return;
            }

            const formData = new FormData(document.getElementById('registerForm'));
            
            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert(data.message, 'success');
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    showAlert(data.error, 'danger');
                }
            } catch (error) {
                showAlert('Registration failed: ' + error.message, 'danger');
            }
        });

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-circle"></i> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
        }
    </script>
</body>
</html>
