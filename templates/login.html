<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AutoRescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { box-shadow: 0 10px 40px rgba(0,0,0,0.2); border-radius: 15px; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25); }
        .btn-login { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 10px 30px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card login-card">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-2 fw-bold"><i class="bi bi-lock"></i> Login</h2>
                        <p class="text-center text-muted mb-4">Welcome back to AutoRescue</p>
                        
                        <div id="alertBox"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Email Address</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Password</label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light"><i class="bi bi-key"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-login btn-lg w-100 text-white fw-bold mb-3">
                                <i class="bi bi-box-arrow-in-right"></i> Login
                            </button>
                        </form>

                        <hr class="my-4">
                        
                        <div class="alert alert-info" role="alert">
                            <strong>Demo Credentials:</strong><br>
                            <small>
                                <strong>Customer:</strong> customer@example.com / password123<br>
                                <strong>Mechanic:</strong> mechanic@example.com / password123
                            </small>
                        </div>

                        <p class="text-center text-muted">Don't have an account? <a href="/register" class="fw-bold text-primary">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(document.getElementById('loginForm'));
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const text = await response.text();
                    if (text.includes('customer_dashboard')) {
                        window.location.href = '/customer-dashboard';
                    } else if (text.includes('mechanic_dashboard')) {
                        window.location.href = '/mechanic-dashboard';
                    } else if (text.includes('admin_dashboard')) {
                        window.location.href = '/admin-dashboard';
                    }
                } else {
                    const data = await response.json();
                    showAlert(data.error || 'Login failed', 'danger');
                }
            } catch (error) {
                showAlert('Login failed: ' + error.message, 'danger');
            }
        });

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-circle"></i> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
        }
    </script>
</body>
</html>
